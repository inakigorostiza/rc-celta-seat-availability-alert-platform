<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RC Celta · ¡Avísame!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #fff;
      background-color: #0f1419;
      line-height: 1.6;
    }

    header {
      background-color: #1a1f2e;
      padding: 1.5rem 0;
      border-bottom: 2px solid #7AB1D9;
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    nav h2 {
      font-size: 1.8rem;
      color: #7AB1D9;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    #hero {
      background: linear-gradient(135deg, #1a2a3a 0%, #0f1419 100%);
      padding: 4rem 2rem;
      text-align: center;
      margin: 3rem 0;
      border-left: 4px solid #7AB1D9;
      border-radius: 12px;
      position: relative;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(122, 177, 217, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    #hero figure {
      margin-bottom: 2.5rem;
      position: relative;
      z-index: 1;
    }

    #hero img {
      display: block;
      margin: 0 auto;
      width: 180px;
      height: 180px;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(122, 177, 217, 0.2));
    }

    #hero figcaption {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
      margin-top: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #hero h1 {
      color: #fff;
      font-size: 3.5rem;
      margin-bottom: 1rem;
      font-weight: 800;
      letter-spacing: -1px;
      position: relative;
      z-index: 1;
    }

    #hero p {
      color: rgba(255, 255, 255, 0.85);
      font-size: 1.25rem;
      max-width: 500px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      font-weight: 300;
    }

    #signup {
      margin: 3rem 0;
      padding: 3rem 2.5rem;
      background-color: #1a1f2e;
      border-radius: 12px;
      border: 1px solid rgba(122, 177, 217, 0.2);
    }

    #signup::before {
      content: 'Únete al Aviso';
      display: block;
      font-size: 1.5rem;
      font-weight: 700;
      color: #7AB1D9;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    form div {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    label {
      font-weight: 600;
      color: #fff;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.9);
    }

    input[type="text"],
    input[type="email"],
    select {
      padding: 1rem;
      border: 2px solid rgba(122, 177, 217, 0.3);
      border-radius: 8px;
      font-size: 1rem;
      color: #fff;
      background-color: rgba(30, 41, 60, 0.8);
      font-family: inherit;
      transition: all 0.3s ease;
    }

    input[type="text"]::placeholder,
    input[type="email"]::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    select:focus {
      outline: none;
      border-color: #7AB1D9;
      background-color: rgba(30, 41, 60, 0.95);
      box-shadow: 0 0 0 4px rgba(122, 177, 217, 0.15);
    }

    input[type="checkbox"] {
      margin-right: 0.75rem;
      cursor: pointer;
      width: 18px;
      height: 18px;
      accent-color: #7AB1D9;
    }

    label[for="privacidad"] {
      display: flex;
      align-items: center;
      font-weight: 400;
      text-transform: none;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.95rem;
    }

    button[type="submit"] {
      background-color: #E4002B;
      color: #fff;
      padding: 1.1rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover {
      background-color: #ff1f3a;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(228, 0, 43, 0.3);
    }

    button[type="submit"]:active {
      transform: translateY(0);
      background-color: #c70024;
    }

    footer {
      background-color: #1a1f2e;
      padding: 2.5rem 2rem;
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      margin-top: 3rem;
      border-top: 1px solid rgba(122, 177, 217, 0.2);
    }

    @media (max-width: 768px) {
      nav {
        padding: 0 1.5rem;
      }

      main {
        padding: 0 1.5rem;
      }

      #hero {
        padding: 3rem 1.5rem;
        margin: 2rem 0;
      }

      #hero h1 {
        font-size: 2.5rem;
      }

      #hero p {
        font-size: 1.05rem;
      }

      #hero img {
        width: 140px;
        height: 140px;
      }

      #signup {
        padding: 2rem 1.5rem;
      }

      button[type="submit"] {
        padding: 0.95rem 1.5rem;
        font-size: 0.95rem;
      }
    }

    @media (max-width: 480px) {
      nav h2 {
        font-size: 1.5rem;
      }

      #hero {
        padding: 2rem 1rem;
        border-left-width: 3px;
      }

      #hero h1 {
        font-size: 2rem;
      }

      #hero p {
        font-size: 0.95rem;
      }

      #hero img {
        width: 120px;
        height: 120px;
      }

      #signup {
        padding: 1.5rem 1rem;
      }

      form {
        gap: 1.25rem;
      }

      input[type="text"],
      input[type="email"],
      select {
        padding: 0.9rem;
      }
    }
  </style>
</head>
