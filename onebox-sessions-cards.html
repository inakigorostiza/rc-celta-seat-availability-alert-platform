<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RC Celta · Partidos Disponibles</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background-color: #0f1419;
      color: #e0e0e0;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #1a2a3a 0%, #0f1419 100%);
      padding: 3rem 2rem;
      border-bottom: 2px solid #7AB1D9;
      text-align: center;
    }

    header h1 {
      color: #fff;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    header p {
      color: #7AB1D9;
      font-size: 1rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .search-section {
      margin-bottom: 3rem;
    }

    .search-input {
      width: 100%;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      border: 2px solid rgba(122, 177, 217, 0.3);
      border-radius: 8px;
      background-color: #1a1f2e;
      color: #fff;
      transition: all 0.3s ease;
    }

    .search-input:focus {
      outline: none;
      border-color: #7AB1D9;
      box-shadow: 0 0 0 4px rgba(122, 177, 217, 0.15);
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .results-info {
      color: #999;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .card {
      background-color: #1a1f2e;
      border: 1px solid rgba(122, 177, 217, 0.2);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .card:hover {
      border-color: #7AB1D9;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(122, 177, 217, 0.1);
    }

    .card-image {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #1a2a3a 0%, #0f1419 100%);
      position: relative;
      overflow: hidden;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(122, 177, 217, 0.2) 0%, rgba(228, 0, 43, 0.1) 100%);
      color: #7AB1D9;
      font-size: 3rem;
    }

    .card-content {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: #bbb;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .meta-icon {
      color: #7AB1D9;
      font-weight: 700;
    }

    .card-date {
      color: #7AB1D9;
      font-weight: 600;
    }

    .card-venue {
      color: #a8e61d;
      font-weight: 600;
    }

    .card-price {
      margin-top: auto;
      margin-bottom: 1rem;
      padding: 1rem;
      background-color: rgba(122, 177, 217, 0.1);
      border-radius: 6px;
      border-left: 3px solid #7AB1D9;
    }

    .price-label {
      font-size: 0.75rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.25rem;
    }

    .price-range {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
    }

    .availability-section {
      padding: 1rem;
      background-color: rgba(30, 41, 60, 0.8);
      border-radius: 6px;
    }

    .availability-label {
      font-size: 0.75rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
      display: block;
    }

    .availability-bar {
      width: 100%;
      height: 8px;
      background-color: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .availability-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .availability-fill.green {
      background: linear-gradient(90deg, #a8e61d 0%, #7ce028 100%);
    }

    .availability-fill.amber {
      background: linear-gradient(90deg, #ff9d76 0%, #ffa94d 100%);
    }

    .availability-fill.red {
      background: linear-gradient(90deg, #ff6b6b 0%, #ff1f3a 100%);
    }

    .availability-text {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }

    .availability-count {
      font-weight: 700;
      font-size: 1.05rem;
    }

    .availability-count.green {
      color: #a8e61d;
    }

    .availability-count.amber {
      color: #ff9d76;
    }

    .availability-count.red {
      color: #ff1f3a;
    }

    .availability-status {
      font-size: 0.8rem;
      color: #999;
    }

    .no-results {
      text-align: center;
      padding: 4rem 2rem;
      color: #666;
    }

    .no-results-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .no-results-text {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .no-results-hint {
      color: #555;
      font-size: 0.9rem;
    }

    .footer {
      text-align: center;
      padding: 2rem;
      color: #666;
      border-top: 1px solid rgba(122, 177, 217, 0.1);
      margin-top: 2rem;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 2rem;
      }

      .cards-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .container {
        padding: 1rem;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 2rem 1rem;
      }

      header h1 {
        font-size: 1.5rem;
      }

      .search-input {
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>⚽ Partidos Disponibles</h1>
    <p>RC Celta · Tickets y Entradas Disponibles</p>
  </header>

  <div class="container">
    <div class="search-section">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="🔍 Busca por partido, evento o recinto..."
        aria-label="Buscar partidos"
      >
      <div class="results-info">
        <span id="resultsCount">Cargando...</span>
      </div>
    </div>

    <div class="cards-grid" id="cardsGrid">
      <!-- Cards will be generated here -->
    </div>

    <div id="noResults" class="no-results" style="display: none;">
      <div class="no-results-icon">🔍</div>
      <div class="no-results-text">No se encontraron partidos</div>
      <div class="no-results-hint">Intenta con otra búsqueda</div>
    </div>
  </div>

  <div class="footer">
    <p>✅ Datos en tiempo real desde ONEBOX API • Última actualización: <span id="timestamp">--</span></p>
  </div>

  <script>
    let allSessions = [];

    // Load sessions data
    async function loadSessions() {
      try {
        const response = await fetch('./sessions-data.json');
        const data = await response.json();
        allSessions = data.sessions || [];
        document.getElementById('timestamp').textContent = new Date(data.timestamp).toLocaleString('es-ES');
        renderSessions(allSessions);
        setupSearch();
      } catch (error) {
        console.error('Error loading sessions:', error);
        document.getElementById('cardsGrid').innerHTML = '<div class="no-results"><div class="no-results-icon">⚠️</div><div class="no-results-text">Error al cargar los partidos</div></div>';
      }
    }

    function formatDate(isoDate) {
      const date = new Date(isoDate);
      return date.toLocaleDateString('es-ES', {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getAvailabilityStatus(occupancy) {
      if (occupancy >= 80) return { class: 'red', text: 'Casi lleno' };
      if (occupancy >= 50) return { class: 'amber', text: 'Moderado' };
      return { class: 'green', text: 'Disponible' };
    }

    function createCard(session) {
      const { availability, name, event, venue, date, price, images } = session;

      // Get image URL
      let imageUrl = '';
      if (images?.landscape && Array.isArray(images.landscape) && images.landscape[0]?.['es-ES']) {
        imageUrl = images.landscape[0]['es-ES'];
      } else if (images?.main?.['es-ES']) {
        imageUrl = images.main['es-ES'];
      }

      // Format data
      const dateStr = date?.start ? formatDate(date.start) : 'Fecha no especificada';
      const venueName = venue?.name || 'Recinto no especificado';
      const eventName = event?.name || name;
      const minPrice = price?.min?.value || 'TBD';
      const maxPrice = price?.max?.value || 'TBD';

      // Calculate availability
      const total = availability?.total || 0;
      const available = availability?.available || 0;
      const occupancy = availability?.occupancy || 0;
      const status = getAvailabilityStatus(occupancy);

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-image">
          ${imageUrl ? `<img src="${imageUrl}" alt="${eventName}" loading="lazy">` : `<div class="card-image-placeholder">🎫</div>`}
        </div>
        <div class="card-content">
          <div class="card-title">${name}</div>

          <div class="card-meta">
            <div class="meta-item">
              <span class="meta-icon">📅</span>
              <span class="card-date">${dateStr}</span>
            </div>
            <div class="meta-item">
              <span class="meta-icon">📍</span>
              <span class="card-venue">${venueName}</span>
            </div>
          </div>

          <div class="card-price">
            <div class="price-label">Rango de precios</div>
            <div class="price-range">€${minPrice} - €${maxPrice}</div>
          </div>

          <div class="availability-section">
            <span class="availability-label">Disponibilidad de entradas</span>
            <div class="availability-bar">
              <div class="availability-fill ${status.class}" style="width: ${occupancy}%"></div>
            </div>
            <div class="availability-text">
              <span class="availability-count ${status.class}">${available} asientos</span>
              <span class="availability-status">${status.text}</span>
            </div>
          </div>
        </div>
      `;

      return card;
    }

    function renderSessions(sessions) {
      const grid = document.getElementById('cardsGrid');
      const noResults = document.getElementById('noResults');
      const resultsCount = document.getElementById('resultsCount');

      if (sessions.length === 0) {
        grid.style.display = 'none';
        noResults.style.display = 'block';
        resultsCount.textContent = 'No hay resultados';
        return;
      }

      grid.innerHTML = '';
      sessions.forEach(session => {
        grid.appendChild(createCard(session));
      });

      grid.style.display = 'grid';
      noResults.style.display = 'none';
      resultsCount.textContent = `${sessions.length} partido${sessions.length !== 1 ? 's' : ''} disponible${sessions.length !== 1 ? 's' : ''}`;
    }

    function setupSearch() {
      const searchInput = document.getElementById('searchInput');

      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();

        if (!query) {
          renderSessions(allSessions);
          return;
        }

        const filtered = allSessions.filter(session => {
          const name = session.name?.toLowerCase() || '';
          const eventName = session.event?.name?.toLowerCase() || '';
          const venueName = session.venue?.name?.toLowerCase() || '';

          return name.includes(query) || eventName.includes(query) || venueName.includes(query);
        });

        renderSessions(filtered);
      });
    }

    // Load on page load
    document.addEventListener('DOMContentLoaded', loadSessions);
  </script>
</body>
</html>
